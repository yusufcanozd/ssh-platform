<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Giriş — SSH KPI Platformu</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
</head>
<body>

<div class="login-wrap">
  <div class="login-card animate-in">

    <div class="login-logo">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <div style="width:36px;height:36px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.2);
            border-radius:9px;display:flex;align-items:center;justify-content:center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div>
          <h1>SSH KPI Platformu</h1>
          <p>Türkiye Otomotiv Satış Sonrası Hizmetler</p>
        </div>
      </div>
      <div style="font-size:11px;color:var(--tx3);line-height:1.6;
          background:var(--surf2);border-radius:var(--radius-sm);padding:10px 12px;">
        Rekabet kuruluna uyumlu, anonim KPI raporlama platformu.<br>
        Erişim için sistem yöneticinizle iletişime geçin.
      </div>
    </div>

    <div class="login-err" id="login-err"></div>

    <div class="form-row">
      <label>E-posta adresi</label>
      <input type="email" id="email" placeholder="ornek@marka.com"
             autocomplete="email" autofocus>
    </div>

    <div class="form-row">
      <label>Şifre</label>
      <div style="position:relative">
        <input type="password" id="password" placeholder="••••••••"
               autocomplete="current-password" style="padding-right:40px"
               onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="togglePw()" style="position:absolute;right:10px;top:50%;
            transform:translateY(-50%);background:none;border:none;
            color:var(--tx3);cursor:pointer;padding:4px" title="Şifreyi göster/gizle">
          <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">
      Giriş Yap
    </button>

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);
        font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:6px">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Şifrenizi unuttuysanız yöneticinize başvurun.
    </div>

  </div>
</div>

<script>
// Zaten giriş yapılmışsa yönlendir
redirectIfLoggedIn();

let pwVisible = false;
function togglePw() {
    pwVisible = !pwVisible;
    const inp = document.getElementById('password');
    const ico = document.getElementById('eye-icon');
    inp.type = pwVisible ? 'text' : 'password';
    ico.style.opacity = pwVisible ? '1' : '.5';
}

async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');
    const errDiv   = document.getElementById('login-err');

    errDiv.style.display = 'none';

    if (!email || !password) {
        errDiv.textContent = 'E-posta ve şifre zorunludur.';
        errDiv.style.display = 'block';
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Giriş yapılıyor...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
        const msgs = {
            'Invalid login credentials': 'E-posta veya şifre hatalı.',
            'Email not confirmed':       'E-posta adresiniz onaylanmamış.',
            'Too many requests':         'Çok fazla deneme. Lütfen bekleyin.',
        };
        errDiv.textContent = msgs[error.message] || 'Giriş başarısız. Tekrar deneyin.';
        errDiv.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Giriş Yap';
        return;
    }

    // Profili çek → role göre yönlendir
    const profile = await fetchProfile(data.user.id);
    if (!profile) {
        errDiv.textContent = 'Profil bulunamadı. Yöneticinizle iletişime geçin.';
        errDiv.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Giriş Yap';
        return;
    }

    if (!profile.is_active) {
        await sb.auth.signOut();
        errDiv.textContent = 'Hesabınız deaktif. Yöneticinizle iletişime geçin.';
        errDiv.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Giriş Yap';
        return;
    }

    // Yönlendirme
    if (['superadmin','admin'].includes(profile.role)) {
        window.location.href = '/admin.html';
    } else {
        window.location.href = '/dashboard.html';
    }
}
</script>
</body>
</html>
